services:
  # Backend API Service
  - name: lotto539-api
    type: web
    region: taipei
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements.txt && cd ../frontend && npm install && npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PIP_VERSION
        value: "25.3"
    directory: backend
    plan: free
