services:
  # Backend API Service
  - name: lotto539-api
    type: web
    region: taipei
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    directory: backend
    plan: free

  # Frontend Static Site (requires GitHub connection)
  - name: lotto539-frontend
    type: static
    region: taipei
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    plan: free
